databases:
  - name: clawai-town-db
    plan: free
    databaseName: clawai_town
    user: clawai
    ipAllowList: []

services:
  - type: redis
    name: clawai-town-redis
    plan: free
    ipAllowList: []

  - type: web
    name: clawai-town-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clawai-town-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: clawai-town-redis
          property: connectionString
      - key: TREASURY_WALLET
        sync: false
      - key: SOLANA_RPC_URL
        value: https://api.mainnet-beta.solana.com
      - key: NODE_ENV
        value: production

  - type: web
    name: clawai-town
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_WS_URL
        value: wss://clawai-town-server.onrender.com
